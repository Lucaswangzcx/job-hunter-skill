name: Bug 报告
description: 反馈一个可以复现的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题。请尽量提供可复现的信息，方便我们快速定位。

  - type: input
    id: platform
    attributes:
      label: 平台
      description: 你遇到问题时使用的是哪个平台？
      placeholder: Boss直聘 / 实习僧
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: 运行模式
      options:
        - rehearsal
        - apply
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: 执行命令
      description: 请贴出你运行的完整命令。
      placeholder: job-hunter --platform boss --mode rehearsal --job "Java开发实习生" --city 北京 --count 1
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志或报错
      description: 提交前请先去掉隐私信息。
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请写明 Python 版本、系统、浏览器、DrissionPage 版本，以及 `doctor.py --json` 的结果。
