name: 功能建议
description: 提出改进想法或新增平台适配器
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题
      description: 你希望改善哪一段流程，或者当前有什么限制？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你的建议
      description: 请描述你希望看到的变化。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的其他方案

  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - Boss 适配器
        - 实习僧适配器
        - 评分 / LLM
        - 日志 / 分析
        - CLI / 打包
        - 文档
        - 新平台适配器
    validations:
      required: true
